services:
  - type: web
    name: productiv
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /app/data
    disk:
      name: productiv-data
      mountPath: /app/data
      sizeGB: 1

